syntax = "proto3";

package Proto;

enum FlightState
{
    FLIGHTSTATE_UNKNOWN = 0;
    UNARMED             = 1;
    GROUNDIDLE          = 2;
    INFLIGHT            = 3;
    MAINCHUTE           = 4;
}

message Control { optional FlightState state = 1; }

message InFlightData
{
    BMP_Data bmp_data            = 1;
    float accel_gyro_temperature = 2;
    VectorF accel                = 3;
    VectorF gyro                 = 4;
    VectorF magnetometer         = 5;
    float thermometer            = 6;

    message BMP_Data
    {
        float temperature = 1;
        float pressure    = 2;
        float altitude    = 3;
    }
    message VectorF
    {
        float X = 1;
        float Y = 2;
        float Z = 3;
    }
}

message SwitchRadioFrequency { float new_frequency = 1; }

message DebugMessage
{
    uint32 status = 1;
    string msg    = 2;
}

message InfoExchange
{
    uint32 radio_version       = 1;
    uint32 proto_3_msg_version = 2;
}

message Ack { uint32 response_to_which_message = 1; }
